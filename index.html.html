<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Estoque Geral Editável</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type=number] {
            -moz-appearance: textfield;
        }

        @media print {
            body {
                background-color: white !important;
                color: black !important;
            }
            header, .no-print {
                display: none !important;
            }
            main {
                max-width: 100% !important;
                padding: 0 !important;
            }
            .bg-gray-800 {
                background-color: #f3f4f6 !important;
                border: 1px solid #d1d5db !important;
            }
            .text-white, .text-gray-200 {
                color: #111827 !important;
            }
            input {
                background-color: #ffffff !important;
                color: #000000 !important;
                border: 1px solid #9ca3af !important;
            }
            .text-emerald-400 { color: #047857 !important; }
            .text-rose-400 { color: #b91c1c !important; }
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 font-sans min-h-screen pb-12">

    <header class="bg-gray-800 border-b border-gray-700 py-6 mb-8 shadow-md">
        <div class="max-w-7xl mx-auto px-4 flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <h1 class="text-2xl font-bold text-white flex items-center gap-2">
                    🧮 Calculadora de Divergência Completa
                </h1>
                <p class="text-sm text-gray-400 mt-1">Selecione a filial, altere as colunas cinzas e salve o relatório em PDF.</p>
            </div>
            
            <div class="flex flex-wrap items-center gap-4 no-print">
                <div class="flex items-center gap-2">
                    <label for="seletor-filial" class="text-sm font-medium text-gray-300">Filial:</label>
                    <select id="seletor-filial" onchange="alternarFilial()" class="bg-gray-700 text-white rounded-lg px-3 py-2 border border-gray-600 focus:border-teal-500 focus:outline-none font-medium">
                        <option value="matriz">Matriz (13/05)</option>
                        <option value="mineiros">Mineiros (22/05)</option>
                        <option value="catedral">Catedral (14/05)</option>
                        <option value="said">Said (14/05)</option>
                        <option value="rio-verde">Rio Verde (20/05)</option>
                    </select>
                </div>

                <button onclick="window.print()" class="bg-teal-600 hover:bg-teal-500 text-white font-semibold py-2 px-4 rounded-lg shadow border border-teal-500 flex items-center gap-2 transition-all active:scale-95">
                    📥 Salvar PDF
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4">
        
        <section class="bg-gray-800 rounded-xl border border-gray-700 shadow-xl overflow-hidden">
            <div class="p-4 bg-gray-750 font-semibold text-teal-400 border-b border-gray-700 flex justify-between items-center">
                <span id="nome-filial-titulo">Filial: Matriz</span>
                <span class="text-xs text-gray-400 font-mono">Status: Pronto para edição</span>
            </div>
            
            <div class="overflow-x-auto">
                <table class="w-full text-sm text-left text-gray-300">
                    <thead class="text-xs uppercase bg-gray-750 text-gray-400 border-b border-gray-700">
                        <tr>
                            <th class="px-4 py-3">Código</th>
                            <th class="px-4 py-3">Colorante</th>
                            <th class="px-4 py-3 bg-gray-700/30 text-center">Sachê (Qtd)</th>
                            <th class="px-4 py-3 bg-gray-700/30 text-center">ML Dosadora</th>
                            <th class="px-4 py-3 text-right">Sachê(720ml)+ML</th>
                            <th class="px-4 py-3 text-right">Impulsos</th>
                            <th class="px-4 py-3 bg-gray-700/30 text-center">Estoque Sist. (Imp)</th>
                            <th class="px-4 py-3 text-right">Divergência</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-700 font-mono" id="tabela-corpo">
                        </tbody>
                </table>
            </div>
        </section>
    </main>

                { codigo: "60.394", cor: "XR1", sache: 2,  ml: 700,  estoque: 56680.05,fator: 3.2467 }

        const corpoTabela = document.getElementById('tabela-corpo');
        const seletorFilial = document.getElementById('seletor-filial');
        const tituloFilial = document.getElementById('nome-filial-titulo');

        function formatarNumero(valor) {
            return valor.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        function calcularLinha(index) {
            const sache = parseFloat(document.getElementById(`sache-${index}`).value) || 0;
            const ml = parseFloat(document.getElementById(`ml-${index}`).value) || 0;
            const estoqueSist = parseFloat(document.getElementById(`estoque-${index}`).value) || 0;

            const filialAtual = seletorFilial.value;
            const itemDados = bancoDeDados[filialAtual][index];

            // FÓRMULA 1: Sachê (720ml) + ML
            const totalMl = (sache * 720) + ml;
            document.getElementById(`totalMl-${index}`).innerText = totalMl.toLocaleString('pt-BR');

            // FÓRMULA 2: Cálculo dos Impulsos baseado no fator histórico da linha/filial
            let impulsos = totalMl * itemDados.fator;
            document.getElementById(`impulsos-${index}`).innerText = formatarNumero(impulsos);

            // FÓRMULA 3: Divergência = Impulsos - Estoque Sistema
            const divergencia = impulsos - estoqueSist;
            const elDivergencia = document.getElementById(`divergencia-${index}`);
            
            elDivergencia.innerText = formatarNumero(divergencia);

            if (divergencia >= 0) {
                elDivergencia.className = "px-4 py-3 text-right text-emerald-400 font-bold";
            } else {
                elDivergencia.className = "px-4 py-3 text-right text-rose-400 font-bold";
            }
        }

        function alternarFilial() {
            const filialSelecionada = seletorFilial.value;
            const dadosFilial = bancoDeDados[filialSelecionada];
            
            // Atualiza Título
            const textoOpcao = seletorFilial.options[seletorFilial.selectedIndex].text;
            tituloFilial.innerText = `Filial: ${textoOpcao}`;

            // Limpa e Reconstrói as linhas da Tabela
            corpoTabela.innerHTML = '';

            dadosFilial.forEach((item, index) => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-gray-750 transition-colors";
                
                tr.innerHTML = `
                    <td class="px-4 py-3 text-gray-500">${item.codigo}</td>
                    <td class="px-4 py-3 font-sans font-semibold text-gray-200">${item.cor}</td>
                    <td class="px-2 py-1 bg-gray-800/50">
                        <input type="number" id="sache-${index}" value="${item.sache}" min="0"
                            class="w-20 bg-gray-700 text-white text-center rounded py-1 border border-gray-600 focus:border-teal-500 focus:outline-none transition-all"
                            oninput="calcularLinha(${index})">
                    </td>
                    <td class="px-2 py-1 bg-gray-800/50">
                        <input type="number" id="ml-${index}" value="${item.ml}" min="0"
                            class="w-24 bg-gray-700 text-white text-center rounded py-1 border border-gray-600 focus:border-teal-500 focus:outline-none transition-all"
                            oninput="calcularLinha(${index})">
                    </td>
                    <td class="px-4 py-3 text-right text-gray-400 bg-gray-900/20" id="totalMl-${index}">0</td>
                    <td class="px-4 py-3 text-right text-gray-300 bg-gray-900/20" id="impulsos-${index}">0</td>
                    <td class="px-2 py-1 bg-gray-800/50">
                        <input type="number" id="estoque-${index}" value="${item.estoque}" step="0.01"
                            class="w-32 bg-gray-700 text-white text-right rounded py-1 px-2 border border-gray-600 focus:border-teal-500 focus:outline-none transition-all"
                            oninput="calcularLinha(${index})">
                    </td>
                    <td class="px-4 py-3 text-right font-bold" id="divergencia-${index}">0</td>
                `;
                corpoTabela.appendChild(tr);
                calcularLinha(index);
            });
        }

        // Execução inicial ao carregar a página
        window.onload = function() {
            alternarFilial();
        };
    </script>
</body>
</html>
